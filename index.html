<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Luke's Portfolio</title>
  <meta name="description" content="Luke Whitaker's portfolio — an 8-bit village where each building is a project.">
  <meta property="og:title" content="Luke's Portfolio">
  <meta property="og:description" content="Explore an 8-bit village to discover my projects.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Game Canvas -->
  <canvas id="game"></canvas>

  <!-- Title Screen -->
  <div id="title-screen">
    <h1>Luke's Portfolio</h1>
    <h2>an 8-bit adventure</h2>
    <span class="blink" id="start-hint">Press ENTER to start</span>
  </div>

  <!-- Project Overlay -->
  <div id="overlay">
    <div class="overlay-card">
      <h2 id="overlay-title"></h2>
      <p class="subtitle" id="overlay-subtitle"></p>
      <p class="desc" id="overlay-desc"></p>
      <div class="tags" id="overlay-tags"></div>
      <a id="overlay-link" href="#" target="_blank">View Project</a>
      <span class="esc-hint" id="overlay-hint">Press ESC to return</span>
    </div>
  </div>

  <!-- Dialogue Box -->
  <div id="dialogue-box">
    <span id="dialogue-text"></span>
    <span class="hint" id="dialogue-hint">ENTER / ESC</span>
  </div>

  <!-- Mobile Controls -->
  <div id="mobile-controls">
    <div id="dpad">
      <button class="dpad-btn" id="btn-up">▲</button>
      <div class="dpad-row">
        <button class="dpad-btn" id="btn-left">◄</button>
        <button class="dpad-btn" id="btn-right">►</button>
      </div>
      <button class="dpad-btn" id="btn-down">▼</button>
    </div>
    <button class="dpad-btn" id="btn-interact">A</button>
  </div>

  <!-- Game Script -->
  <script type="module" src="src/main.js"></script>

</body>
</html>
